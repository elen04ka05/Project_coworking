<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  {% load static %}

    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="{% static 'css/sign_up.css' %}?v={% now 'U' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="white-rectangle">
    <div class="left-image">
                <img src="{% static 'images/logo.jpg' %}" alt="Логотип">
            </div>
  </div>
  <div class="container">
    <h2 class="form-title"></h2>
        <div class="info-text">
            <h3>SIGN UP</h3>
        </div>

        <!-- Форма -->
        <form>
            <!-- Поле для имени -->
            <div class="form-group">
                <label for="name">Ваше имя *</label>
                <input type="text" id="name" placeholder="Введите ваше имя" required>
            </div>

            <!-- Поле для email -->
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>

            <!-- Поле для телефона -->
            <div class="form-group">
                <label for="phone">Password</label>
                <input type="tel" id="phone" placeholder="Придумайте и введите пароль">
            </div>

            <!-- Две кнопки -->
            <div class="buttons-container">
                <button type="submit" class="btn btn-primary">Sign up</button>
                <button type="reset" class="btn btn-secondary">Sign in</button>
            </div>
        </form>
  </div>

</body>
</html>
